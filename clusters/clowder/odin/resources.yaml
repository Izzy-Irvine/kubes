---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: odin
  namespace: odin
spec:
  parentRefs:
    - name: public
      namespace: ingress
  hostnames:
    - old.odin-cards.com
  rules:
    - backendRefs:
        - name: odin
          port: 80
