apiVersion: v1
kind: Namespace
metadata:
  name: odin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin
  namespace: odin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odin
  template:
    metadata:
      labels:
        app: odin
    spec:
      containers:
        - name: odin
          image: ghcr.io/izzy-irvine/odin:6 # {"$imagepolicy": "odin:odin"}
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 3000
            fsGroup: 2000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: odin
  namespace: odin
spec:
  selector:
    app: odin
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
