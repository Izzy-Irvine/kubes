---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: flux-system
  namespace: flux-system
spec:
  type: github
  events:
    - "ping"
    - "push"
  secretRef:
    name: github-webhook-token
  resources:
    - kind: GitRepository
      name: flux-system
---
# Flux's default NetworkPolicies only allow ingress from pods, but Cilium
# Gateway traffic arrives from Envoy with the reserved "ingress" identity,
# so we have to allow it explicitly.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-webhook
  namespace: flux-system
spec:
  endpointSelector:
    matchLabels:
      app: notification-controller
  ingress:
    - fromEntities:
        - ingress
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webhook-receiver
  namespace: flux-system
spec:
  parentRefs:
    - name: public
      namespace: ingress
  hostnames:
    - flux-webhook.cult-flat.izzy.kiwi
  rules:
    - backendRefs:
        - name: webhook-receiver
          port: 80
