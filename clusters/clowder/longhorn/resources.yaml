apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn-repo
  namespace: longhorn-system
spec:
  interval: 1m0s
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
      version: v1.7.2
  values:
    persistence:
      defaultClassReplicaCount: 2
    longhornUI:
      replicas: 1
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      storageReservedPercentageForDefaultDisk: 5
      # Backups disabled: the izzzy storage account no longer exists.
      # To be replaced with a new backup target at some point.
      # backupTarget: azblob://clowder-longhorn-backups@core.windows.net/
      # backupTargetCredentialSecret: azure-cred
      nodeDownPodDeletionPolicy: delete-deployment-pod
    # defaultBackupStore:
    #   pollInterval: 0
    ingress:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
  interval: 1m0s
---
# Tailnet-only access to the Longhorn UI: https://longhorn.<tailnet>.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: longhorn-frontend
      port:
        number: 80
  tls:
    - hosts:
        - longhorn
---
# Backups disabled until a replacement backup target exists
# apiVersion: longhorn.io/v1beta2
# kind: RecurringJob
# metadata:
#   name: weekly-backup
#   namespace: longhorn-system
# spec:
#   concurrency: 1
#   cron: 0 16 * * 0 # Time is in UTC. This is roughly 4am NST
#   groups:
#   - default
#   labels: {}
#   name: weekly-backup
#   parameters: {}
#   retain: 7
#   task: backup
---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-ephemeral
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  recurringJobSelector: '[{"name":"no-backup", "isGroup":true}]'
