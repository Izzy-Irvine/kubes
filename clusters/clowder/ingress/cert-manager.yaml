apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: ingress
spec:
  interval: 5m0s
  url: https://charts.jetstack.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: ingress
spec:
  chart:
    spec:
      chart: cert-manager
      version: '1.18.2'
      sourceRef:
        kind: HelmRepository
        name: jetstack
  values:
    installCRDs: true
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
  interval: 5m0s
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
---
# DNS-01 for the Route 53 zones we own, plus foreign domains (odin-cards.com)
# that delegate their _acme-challenge names into izzy.kiwi via CNAME
# (cnameStrategy Follow). Credentials: route53-credentials.k8s-sops.yaml
# (IAM user cert-manager, limited to _acme-challenge records).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dns-issuer
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: dns-issuer-account-key
    solvers:
    - dns01:
        cnameStrategy: Follow
        route53:
          region: us-east-1
          accessKeyIDSecretRef:
            name: route53-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: route53-credentials
            key: secret-access-key
